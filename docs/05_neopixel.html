# ⑤ フルカラーLEDを使おう

好きな色に光らせよう（NeoPixel）

*micro:bit 体験ワークショップ*

---

# フルカラーLEDをつなごう

:::

フルカラーLEDには3つの**端子**があるよ。写真のように micro:bit とつなごう。

- **＋（5V）** … 電源のプラスにつなぐ
- **－（G / GND）** … 電源のマイナスにつなぐ
- **DI** … 色や明るさをおくるデータに使う

> DI をつなぐのは端子 **0** でなく **1・2** でもいいよ。うまくいかないときはメンターと一緒に確かめよう。

:::

![micro:bit とフルカラーLEDのつなぎ方](assets/img/ch05/s02_02.png)

---

# 拡張機能を追加しよう

:::

フルカラーLEDを使うには、**neopixel（ネオピクセル）** という部品を追加するよ。

1. 歯車メニューか「**拡張機能**」をクリック
2. `neopixel` をさがして、出てきたカードをクリック
3. メニューに「**Neopixel**」がふえる

:::

![この「neopixel」をえらぶ](assets/img/ch05/s03_06.png)

---

# 増えた機能を見てみよう

:::

「**Neopixel**」と「**その他**」のメニューに、たくさんのブロックがふえたよ。

どんな使い方ができるか、想像できるかな？ これから少しずつ使っていこう。

:::

![「Neopixel」のブロック](assets/img/ch05/s04_07.png)
![「その他」のブロック](assets/img/ch05/s04_08.png)

---

# いろいろな色を表示しよう

:::

1. 使っている**端子**と、**LEDの数**をえらぶ（端子0なら `P0`、1なら `P1`）
2. まず **赤** を表示してみよう

> そのままだと**まぶしい**ので、明るさは **30 くらい**にしよう。赤ができたら、青や緑もためしてね。

:::

![端子とLEDの数をえらんで、赤に設定](assets/img/ch05/s05_11.png)

---

# レインボーカラーを出そう

:::

**色相（しきそう）** とは、すべての色をぐるっと一周ならべたものだよ。

**1 から 360** の数字を指定すると、すきな色を出せるんだ。これを使って、にじ色を表示してみよう。

:::

![色相の輪。1〜360で色がえらべる](assets/img/ch05/s06_14.png)
![レインボーのブロック](assets/img/ch05/s06_15.png)

---

# レインボーを動かそう

:::

にじ色を少しずつずらすと、流れるように動いて見えるよ。

> ⚠ 「**表示する**」ブロックを忘れないように！　考えてみよう：もっと**早く**／**ゆっくり**動かすには？　**逆**に動かすには？

:::

![くり返しで色をずらすと動く](assets/img/ch05/s07_16.png)

---

# 場所をえらんで光らせよう

:::

LED を**1つずつ**、ちがう色に光らせることもできるよ。

「〇番目のLEDを□色にする」のブロックを使おう。

> LEDの番号は **0 から** はじまるよ（1番目＝0、2番目＝1 …）。

:::

![番号をえらんで色を設定する](assets/img/ch05/s08_19.png)

---

# 色を数字（RGB）で作ろう

:::

色は **赤・緑・青（RGB）** の3つの数字でも作れるよ。

- 赤 → `255, 0, 0`
- 緑 → `0, 255, 0`
- 青 → `0, 0, 255`

> じゃあ **白** は？ **黒** は？　オレンジや紫など、すきな色を作ってみよう。

:::

![赤・緑・青の数字で色を作る](assets/img/ch05/s09_20.png)

---

# 音の大きさを棒グラフにしよう

:::

センサーで取った値を、**棒グラフ**のように光らせて表示できるよ。

まわりの**音の大きさ**を測って、LEDの光る数で表してみよう。

> 「最大値」には、センサーが出せる一番大きい値を入れるよ。

:::

![まわりの音を棒グラフで表示](assets/img/ch05/s10_23.png)
