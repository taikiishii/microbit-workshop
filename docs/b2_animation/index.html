# アニメーションをつくろう


---

# なにをするの？

:::

**少しずつ形や場所のちがう絵**を順番に表示すると、動いて見えるよ。パラパラまんがと同じしくみだね。

マイクロビットの **LED画面（25個のライト）** でも、同じようにアニメーションを作れるんだ。

まずは点が下に落ちていくアニメーションを作ってみよう！

:::

![点の位置が違う絵を...](img/s02_03.png)
![順番に表示すると...](img/s02_05.png)
![点が動いて見えるよ!!](img/s02_07.png)

---

# ブロックを置こう

:::

1. 「**基本**」のメニューをクリック
2. 「**LED画面に表示**」ブロックを「**ずっと**」の中にドラッグ

:::

![「基本」メニューの中の「LED画面に表示」ブロックを使うよ](img/s03_10.png)

---

# 1まい目の絵をかこう

:::

1. LED画面の **小さな四角をクリック**して絵をかく

> もう一度クリックすると消えるよ

:::

![四角をクリックして絵をかく](img/s04_14.png)

---

# 絵を増やして動かそう

:::


1. 「LED画面に表示」ブロックを**右クリック**して「**複製する**」をえらぶ
2. 複製したブロックを、1つ目のブロックの下にドラッグしてつなげる
3. 複製したブロックの絵を書き換える
4. 同じように3つ目のブロックを作り、絵を書き換える

> うまく動いたかな？ 絵をふやすと、もっとなめらかに動いたり、複雑な動きもできるよ。

:::

![右クリック →「複製する」](img/s04_13.png)
![ブロックをつなげて絵を少しずつ変える](img/s05_18.png)

---

# いろいろなアニメーションを作ってみよう

:::

> おもしろい動きを探してみよう。

> アイコンも使えるよ。

:::

![雨のしずく](img/s06_01.png)
![ダンシングマン](img/s06_02.png)
