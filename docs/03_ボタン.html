# ③ ボタンで表示を変えよう

A・Bボタンで動きを変える

*micro:bit 体験ワークショップ*

---

# なにをするの？

:::

micro:bit には **Aボタン** と **Bボタン** の2つのボタンがあるよ。**同時押し**もできるんだ。

ボタンを使うと、LEDの表示を変えたり、音を鳴らしたり、プログラムの動きを変えたりできるよ。

> 前がわのまるいマーク（**タッチロゴ**）も、ボタンのように使えるよ。

:::

![左が Aボタン、右が Bボタン、まん中の上がタッチロゴ](assets/img/ch03/s02_02.png)

---

# ボタンでアイコンを出そう

:::

1. 「**入力**」のメニューをクリックし、「**ボタンAが押されたとき**」ブロックを置く
2. 「**基本**」から「**アイコンを表示**」ブロックを、その中にドラッグ

> 「最初だけ」と「ずっと」の中は、空っぽにしておこう。

:::

![「入力」メニューのブロック](assets/img/ch03/s03_03.png)
![組み合わせたところ](assets/img/ch03/s03_06.png)

---

# アイコンを変えて複製しよう

:::

1. アイコンをクリックして、**すきなアイコン**にかえる
2. 「ボタンAが押されたとき」を**右クリック**して「**複製する**」

:::

![クリックしてアイコンをえらぶ](assets/img/ch03/s04_07.png)
![右クリック →「複製する」](assets/img/ch03/s04_09.png)

---

# Bボタンにしよう

:::

1. 複製したほうの「**A**」をクリックして「**B**」に変える
2. アイコンをクリックして、ちがうアイコンにかえる

:::

![「A」を「B」に変える](assets/img/ch03/s05_11.png)
![Bボタン用のブロック](assets/img/ch03/s05_14.png)

---

# ためしてみよう

:::

むらさきの「**ダウンロード**」で書きこんだら、ボタンを押してみよう。

- **Aボタン**を押すと… 1つ目のアイコン
- **Bボタン**を押すと… 2つ目のアイコン

> うまくいったかな？ 「A+B（同時押し）」のブロックもふやしてみよう。

:::

![Aボタンを押すと](assets/img/ch03/s06_16.png)
![Bボタンを押すと](assets/img/ch03/s06_17.png)
