# ① フルカラーLEDを使おう

好きな色に光らせよう（NeoPixel）

*マイクロビット 体験ワークショップ*

---

# フルカラーLEDをつなごう

:::

フルカラーLEDには3つの**端子**があるよ。写真のようにマイクロビットとつなごう。

- **＋（5V）** … 電源のプラスにつなぐ
- **－（G / GND）** … 電源のマイナスにつなぐ
- **DI** … 色や明るさをおくるデータに使う

> DI をつなぐのは端子 **0** でなく **1・2** でもいいよ。うまくいかないときはメンターと一緒に確かめよう。

:::

![マイクロビットとフルカラーLEDのつなぎ方](assets/img/e1/s02_02.png)

---

# 拡張機能を追加しよう

:::

フルカラーLEDを使うには、**neopixel（ネオピクセル）** という部品を追加するよ。

1. 歯車メニューか「**拡張機能**」をクリック
2. `neopixel` をさがして、出てきたカードをクリック
3. メニューに「**Neopixel**」がふえる

:::

![この「neopixel」をえらぶ](assets/img/e1/s03_06.png)

---

# 増えた機能を見てみよう

:::

「**Neopixel**」と「**その他**」のメニューに、たくさんのブロックがふえたよ。

どんな使い方ができるか、想像できるかな？ これから少しずつ使っていこう。

:::

![「Neopixel」のブロック](assets/img/e1/s04_07.png)
![「その他」のブロック](assets/img/e1/s04_08.png)

---

# いろいろな色を表示しよう

:::

1. 使っている**端子**と、**LEDの数**をえらぶ（端子0なら `P0`、1なら `P1`）
2. まず **赤** を表示してみよう

> そのままだと**まぶしい**ので、明るさは **30 くらい**にしよう。赤ができたら、青や緑もためしてね。

:::

![端子とLEDの数をえらんで、赤に設定](assets/img/e1/s05_11.png)

---

# レインボーカラーを出そう

:::

**色相（しきそう）** とは、すべての色をぐるっと一周ならべたものだよ。

**1 から 360** の数字を指定すると、すきな色を出せるんだ。これを使って、にじ色を表示してみよう。

:::

![色相の輪。1〜360で色がえらべる](assets/img/e1/s06_14.png)
![レインボーのブロック](assets/img/e1/s06_15.png)

---

# レインボーを動かそう

:::

にじ色を少しずつずらすと、流れるように動いて見えるよ。

> ⚠ 「**表示する**」ブロックを忘れないように！　考えてみよう：もっと**早く**／**ゆっくり**動かすには？　**逆**に動かすには？

:::

![くり返しで色をずらすと動く](assets/img/e1/s07_16.png)

---

# 場所をえらんで光らせよう

:::

LED を**1つずつ**、ちがう色に光らせることもできるよ。

「〇番目のLEDを□色にする」のブロックを使おう。

> LEDの番号は **0 から** はじまるよ（1番目＝0、2番目＝1 …）。

:::

![番号をえらんで色を設定する](assets/img/e1/s08_19.png)

---

# 色を数字（RGB）で作ろう

:::

色は **赤・緑・青（RGB）** の3つの数字でも作れるよ。

- 赤 → `255, 0, 0`
- 緑 → `0, 255, 0`
- 青 → `0, 0, 255`

> じゃあ **白** は？ **黒** は？　オレンジや紫など、すきな色を作ってみよう。

:::

![赤・緑・青の数字で色を作る](assets/img/e1/s09_20.png)

---

# 音の大きさを棒グラフにしよう

:::

センサーで取った値を、**棒グラフ**のように光らせて表示できるよ。

まわりの**音の大きさ**を測って、LEDの光る数で表してみよう。

> 「最大値」には、センサーが出せる一番大きい値を入れるよ。

:::

![まわりの音を棒グラフで表示](assets/img/e1/s10_23.png)

---

{cover}
# 🎨 応用編：作品を作ろう

ここからはレベルアップ！

*フルカラーLEDで、いろいろな作品を作ってみよう*

---

# 光の三原色（RGB）

:::

**光の三原色**は **赤（R）・緑（G）・青（B）**。この3つの光を混ぜると、どんな色でも作れるよ。テレビやスマホの画面、そして**フルカラーLEDもこの仲間**なんだ。

絵の具は「色の三原色（CMY）」で、混ぜるほど暗くなるけれど、**光は混ぜるほど明るく**なるよ。

:::

![光の三原色 RGB（画面の色）](assets/img/e1/s15_40.png)
![色の三原色 CMY（絵の具の色）](assets/img/e1/s15_39.png)

---

# フルカラーLEDのいろいろな形

:::

フルカラーLEDにはいろいろな形があるよ。どれも中身は**フルカラーLEDを一列に並べたもの**なんだ。

- **テープ型** … すきな長さで使える
- **リング型** … 円形。時計やコンパスに
- **マトリクス型** … 格子状。絵や文字を表示できる

:::

![テープ型](assets/img/e1/s17_47.png)
![リング型](assets/img/e1/s17_48.png)
![マトリクス型](assets/img/e1/s29_74.png)

---

# たくさん光らせるときは？

:::

LEDは、**たくさん・明るく**光らせるほど、電気をたくさん使うよ。マイクロビットが使える電気には限りがあるんだ。

- テープLED（12個）やリングLED（24個）くらいはOK
- それより多くつなぐと、電気が足りなくなることがある

> ⚠ たくさんのLEDを使う作品では、**明るさは30くらい**にして、同時に光らせる数を多くしすぎないようにしよう。

:::

![フルカラーLEDの中身（3色のLED＋小さなマイコン）](assets/img/e1/s16_43.png)

---

# マトリクスLEDを使ってみよう

:::

**マトリクス型**は、LEDが縦横にならんでいるよ。光らせる場所を **x（横）・y（縦）** で指定するんだ。

- 8×8 のマトリクスなら、幅（width）に **8** を入れる
- x も y も **0 から** 始まるよ

:::

![マトリクスLEDのプログラム](assets/img/e1/s29_72.png)
![8×8 マトリクスLED](assets/img/e1/s29_74.png)

---

# 作品①：LEDタイマー

:::

リングLEDで、時間が減っていくタイマーを作ろう。

- スタートは**レインボー**を表示
- **Aボタン**を押すと、0.5秒ごとに光が1つずつ減る
- ゼロになったら、またレインボーにもどる

> 💪 「棒グラフ」で表す方法と、「1個ずつずらす」方法があるよ。どちらでも作れるかな？

:::

![LEDタイマーのプログラム例](assets/img/e1/s32_77.png)

---

# 作品②：コンパス（方位磁針）

:::

マイクロビットの**磁気センサー**で北の方角を調べて、リングLEDで北を指すコンパスを作ろう。

**方位角**は、北が **0度**、時計回りに一周して **360度** だよ。

> ⚠ 書きこむと最初に `TILT TO FILL SCREEN` と出ることがあるよ。マイクロビットを回して全部のLEDを点けると、コンパスが動き始めるんだ。

:::

![方位角（北が0度）](assets/img/e1/s38_85.png)
![コンパスのプログラム例](assets/img/e1/s39_87.png)

---

# 作品③：明るさ計

:::

マイクロビットは、**5×5のLEDの部分**でまわりの明るさを測れるよ。その明るさをリングLEDの棒グラフで表示してみよう。

> 💪 手で光をさえぎったり、ライトを当てたりして、表示が変わるのを見てみよう。

:::

![明るさ計のプログラム例](assets/img/e1/s43_93.png)
![マイクロビットは5×5のLEDで明るさを測る](assets/img/e1/s42_92.png)

---

# 作品④：ルーレット

:::

リングLEDの光をぐるぐる回して、ルーレットを作ろう。

- **Aボタン**で光が回り始める
- **Bボタン**でだんだん遅くなって止まる

> 💪 「動く」という変数で回転を、「待ち時間」という変数で速さを変えているよ。もっと速く回すにはどうする？

:::

![ルーレットのプログラム例](assets/img/e1/s46_96.png)

---

# 作品⑤：水準器

:::

**水準器**は、水平かどうかを測る道具。マトリクスLEDで、傾きに合わせて光る場所が動く水準器を作ろう。

- **ピッチ**（前後の傾き）を x に、**ロール**（左右の傾き）を y に入れる
- 水平にすると、光がま中に来るよ

> 💪 反応が敏感すぎたら、感度を下げるにはどこを直せばいいかな？

:::

![水準器のプログラム例](assets/img/e1/s49_103.png)
![水準器（水平を測る道具）](assets/img/e1/s48_102.png)
