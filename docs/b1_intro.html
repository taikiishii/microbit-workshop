# マイクロビットの紹介と使い方

はじめてのマイクロビット プログラミング

*マイクロビット 体験ワークショップ*

---

# マイクロビットってなに？

:::

マイクロビットは、イギリスの公共放送 **BBC** がつくった、勉強のための小さなコンピュータだよ。

この小さなボードに、光ったり・音が鳴ったり・動きを感じたりする機能がたくさん詰まっているんだ。

- 25個の **LED**（光る画面）
- **A・B の2つのボタン**
- 音を鳴らす **スピーカー** とマイク
- かたむきをしらべる **センサー**

> もっといろいろあるよ。これから一緒に、どんなことができるか試していこう！

:::

![表側にボタンとLED画面、下にはセンサーなどをつなぐピンがならんでいるよ](assets/img/b1/s02_01.png)

---

# メイクコードをひらこう

:::

プログラムは **メイクコード** というWebサイトで作るよ。

1. ブラウザで `https://makecode.microbit.org` をひらく
2. 「**新しいプロジェクト**」をクリック


> 「makecode」で検索してもたどりつけるよ。うまく開けないときはメンターによんでね。

:::

![メイクコードのトップ画面。「新しいプロジェクト」をクリックしよう](assets/img/b1/s03_05.png)

---

# プロジェクトに名前をつけよう

:::

1. 好きな名前を入力する（例：`はじめてのマイクロビット`）
2. 「**作成**」をクリック

> この画面が開いたら大成功！ 🎉　左がわの黒いマイクロビットは、動きをためせる「シミュレーター」だよ。

:::

![メイクコードのプログラム画面。左は動きを試せるシミュレーター](assets/img/b1/s04_09.png)

---

# マイクロビットをパソコンにつなごう ①

:::

USBケーブルで、マイクロビットとパソコンをつなぐよ。

1. 画面 左下の「**・・・**」をクリック
2. 「**デバイスを接続する**」をえらぶ
3. でてきた画面で「**次へ**」をクリック

:::

![左下の「・・・」→「デバイスを接続する」](assets/img/b1/s05_10.png)

---

# マイクロビットをパソコンにつなごう ②

:::

1. 「**ペア**」ボタンをクリック
2. 出てきた `BBC micro:bit` をえらんで「**接続**」

> ⚠ エラーが出たり、名前が見つからないときは、メンターに相談してね。一度つないだら次からは自動でつながるよ。

:::

![ペア → マイクロビットをえらんで接続](assets/img/b1/s06_12.png)

---

# はじめてのプログラムを作ろう

:::

画面に **ハート** を表示させてみよう。

1. 「**基本**」のメニューをクリック
2. 「**アイコンを表示**」ブロックを「**ずっと**」の中にドラッグ
3. アイコンの ▼ をクリックして **ハート** をえらぶ

> 「最初だけ」「ずっと」のブロックは、はじめから置いてあるよ。いらないブロックは画面の外にドラッグすると消せるよ。

:::

![「基本」メニューの中の「アイコンを表示」ブロック](assets/img/b1/s07_18.png)

---

# マイクロビットに書きこもう

:::

作ったプログラムを、本物のマイクロビットに送るよ。

1. 画面 左下の むらさきの「**ダウンロード**」ボタンをクリック
2. マイクロビットの画面に **ハート ♥** が出たら大成功！ 🎉

> 複数の文字を表示すると、右から左へ流れて表示されるよ。いろいろなアイコンや文字も試してみよう。

:::

![ダウンロードすると、マイクロビットにハートが表示される](assets/img/b1/s08_19.png)
